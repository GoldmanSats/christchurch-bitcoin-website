openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Christchurch Bitcoin Meetup API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: meetups
    description: Meetup operations
  - name: rsvps
    description: RSVP operations
  - name: resources
    description: Bitcoin resource operations
  - name: merchants
    description: Merchant operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /meetups:
    get:
      operationId: listMeetups
      tags: [meetups]
      summary: List upcoming meetups
      description: Returns the next 6 upcoming meetups (first Wednesday of each month)
      responses:
        "200":
          description: List of upcoming meetups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Meetup"

  /rsvps:
    post:
      operationId: createRsvp
      tags: [rsvps]
      summary: RSVP to a meetup
      description: Submit an RSVP with name for a specific meetup date
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRsvpBody"
      responses:
        "201":
          description: RSVP created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RsvpResponse"
        "409":
          description: Already RSVPed with this name
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /rsvps/counts:
    get:
      operationId: getRsvpCounts
      tags: [rsvps]
      summary: Get RSVP counts per meetup
      description: Returns the number of RSVPs for each upcoming meetup date
      responses:
        "200":
          description: RSVP counts by meetup date
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RsvpCount"

  /resources:
    get:
      operationId: listResources
      tags: [resources]
      summary: List Bitcoin resources
      description: Returns curated Bitcoin learning resources
      responses:
        "200":
          description: List of resources
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Resource"

  /merchants:
    get:
      operationId: listMerchants
      tags: [merchants]
      summary: List local merchants
      description: Returns Christchurch merchants that accept Bitcoin
      responses:
        "200":
          description: List of merchants
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Merchant"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Meetup:
      type: object
      properties:
        date:
          type: string
          format: date
          description: The meetup date (YYYY-MM-DD)
        dayOfWeek:
          type: string
          description: Day of the week
        month:
          type: string
          description: Full month name
        dayOfMonth:
          type: integer
          description: Day of the month
        year:
          type: integer
          description: Year
        rsvpCount:
          type: integer
          description: Number of RSVPs for this meetup
      required:
        - date
        - dayOfWeek
        - month
        - dayOfMonth
        - year
        - rsvpCount

    CreateRsvpBody:
      type: object
      properties:
        name:
          type: string
          description: Name or nym for RSVP
        meetupDate:
          type: string
          format: date
          description: The meetup date to RSVP for (YYYY-MM-DD)
      required:
        - name
        - meetupDate

    RsvpResponse:
      type: object
      properties:
        message:
          type: string
        meetupDate:
          type: string
          format: date
      required:
        - message
        - meetupDate

    RsvpCount:
      type: object
      properties:
        meetupDate:
          type: string
          format: date
        count:
          type: integer
      required:
        - meetupDate
        - count

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    Resource:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        url:
          type: string
          format: uri
        category:
          type: string
          enum: [getting-started, wallets, education, news, tools]
      required:
        - id
        - title
        - description
        - url
        - category

    Merchant:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        category:
          type: string
        address:
          type: string
        website:
          type: string
          format: uri
      required:
        - id
        - name
        - description
        - category
